<div class="min-h-screen bg-gray-50">
  <!-- Header -->
  <header class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h1 class="text-xl font-bold text-gray-900">🔐 Verifiable Credentials Explorer</h1>
          <p class="text-sm text-gray-500 mt-0.5">
            Interactive demo of
            <a href="https://www.w3.org/TR/vc-data-model-2.0/" target="_blank" class="text-blue-600 hover:underline">W3C VC Data Model v2.0</a>
            — built for Truecaller
          </p>
        </div>
      </div>

      <!-- Persona Tabs -->
      <nav class="flex gap-1">
        <button (click)="setPersona('HOLDER')"
          class="px-4 py-2 rounded-t-lg text-sm font-medium transition relative"
          [class]="state.activePersona() === 'HOLDER'
            ? 'bg-purple-100 text-purple-800 border border-b-0 border-purple-200'
            : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100'">
          💼 Wallet
          @if (state.storedCredentials().length > 0) {
            <span class="absolute -top-1 -right-1 w-5 h-5 bg-purple-600 text-white text-xs rounded-full flex items-center justify-center">
              {{ state.storedCredentials().length }}
            </span>
          }
        </button>
        <button (click)="setPersona('ISSUER')"
          class="px-4 py-2 rounded-t-lg text-sm font-medium transition"
          [class]="state.activePersona() === 'ISSUER'
            ? 'bg-blue-100 text-blue-800 border border-b-0 border-blue-200'
            : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100'">
          🏛️ Issuer
        </button>
        <button (click)="setPersona('VERIFIER')"
          class="px-4 py-2 rounded-t-lg text-sm font-medium transition"
          [class]="state.activePersona() === 'VERIFIER'
            ? 'bg-emerald-100 text-emerald-800 border border-b-0 border-emerald-200'
            : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100'">
          ✅ Verifier
        </button>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-5xl mx-auto px-4 py-6">
    <router-outlet />
  </main>

  <!-- Footer -->
  <footer class="max-w-5xl mx-auto px-4 py-8 text-center text-xs text-gray-400 border-t border-gray-100 mt-8">
    <p>
      An interactive demo of the <a href="https://www.w3.org/TR/vc-data-model-2.0/" target="_blank" class="text-blue-500 hover:underline">W3C Verifiable Credentials standard</a>,
      built as an explainer for Truecaller.
    </p>
  </footer>
</div>
